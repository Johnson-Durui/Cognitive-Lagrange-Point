<section class="qvo-shell" role="dialog" aria-modal="true" aria-label="Quantum Vibe Oracle">
  <canvas class="qvo-canvas" data-qvo-canvas></canvas>

  <div class="qvo-collapse" data-qvo-collapse>
    <div class="qvo-collapse-core"></div>
    <div class="qvo-collapse-copy">
      <span>Wave Function Collapse</span>
      <strong>正在用你的真实决策数据生成第一个种子宇宙</strong>
    </div>
  </div>

  <header class="qvo-topbar">
    <div>
      <div class="qvo-kicker">Quantum Vibe Oracle</div>
      <h2>量子 vibe 预言机</h2>
      <p data-qvo-question>正在读取当前决策数据…</p>
    </div>
    <div class="qvo-mode-switch" aria-label="模式切换">
      <button type="button" data-qvo-close>理性模式</button>
      <button type="button" class="is-active" data-qvo-poetic>量子诗意模式</button>
    </div>
  </header>

  <aside class="qvo-panel">
    <div class="qvo-panel-title">三条可漫游多宇宙</div>
    <div class="qvo-universe-list" data-qvo-universe-list></div>
    <div class="qvo-diary" data-qvo-diary>选择一个宇宙，查看平行自我的故事。</div>
    <div class="qvo-observer">
      <span>观测者效应</span>
      <meter min="0" max="100" value="8" data-qvo-observer-meter></meter>
      <small data-qvo-observer-copy>鼠标 / 触摸 / 可选生物信号会轻微扰动概率场。</small>
      <div class="qvo-bio-readout">
        <span data-qvo-heart>心率 -- bpm</span>
        <span data-qvo-breath>呼吸 --%</span>
        <span data-qvo-hrv>HRV --%</span>
      </div>
      <div class="qvo-audio-actions">
        <button type="button" class="qvo-audio-button" data-qvo-audio-toggle>静音量子音景</button>
      </div>
      <div class="qvo-bio-actions">
        <button type="button" class="qvo-bio-button" data-qvo-bio-enable>允许生物共振</button>
      </div>
    </div>
  </aside>

  <footer class="qvo-footer">
    <span data-qvo-renderer>Renderer: preparing…</span>
    <span>拖拽旋转 · 滚轮缩放 · 点击宇宙卡片飞行 · 音频/生物反馈均可关闭</span>
  </footer>
</section>
