name: Verify

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Python dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk
          python -m pip install -r requirements.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Compile Python
        run: python -m py_compile server.py server_core.py server_shared.py server_runtime.py server_detection.py decision/pipeline.py research/api.py

      - name: Run core tests
        run: python -m unittest tests.test_decision_api_smoke tests.test_decision_tier_regression tests.test_engine_b_runtime tests.test_decision_summary_report
